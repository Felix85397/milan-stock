name: Daily Firestore Backup

on:
  schedule:
    - cron: '0 22 * * *'   # mezzanotte italiana (00:00 CEST = 22:00 UTC)
    - cron: '0  8 * * *'   # mattina italiana    (10:00 CEST = 08:00 UTC)
    - cron: '0 16 * * *'   # pomeriggio italiano (18:00 CEST = 16:00 UTC)
  workflow_dispatch:         # avvio manuale dal tab Actions su GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create backup directory
        run: mkdir -p backup

      - name: Download and parse Firestore data
        run: |
          curl -s "https://firestore.googleapis.com/v1/projects/ac-milan-stock-exchange/databases/(default)/documents/players?key=AIzaSyAlU_5N7xROR2eZHA27Zv_9B4ZPLOLR7bw&pageSize=100" \
          | python3 -c "
import json, sys
data = json.load(sys.stdin)
players = []
for doc in data.get('documents', []):
    f = doc.get('fields', {})
    players.append({
        'id':         doc['name'].split('/')[-1],
        'name':       f.get('name',  {}).get('stringValue',  ''),
        'votesBuy':   int(f.get('votesBuy',  {}).get('integerValue', 0)),
        'votesHold':  int(f.get('votesHold', {}).get('integerValue', 0)),
        'votesSell':  int(f.get('votesSell', {}).get('integerValue', 0)),
    })
players.sort(key=lambda x: x['name'])
print(json.dumps(players, indent=2, ensure_ascii=False))
" > backup/players-$(date +%Y-%m-%d).json

      - name: Keep only last 7 backups
        run: ls -t backup/players-*.json | tail -n +8 | xargs rm -f || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backup/
          git diff --staged --quiet || git commit -m "backup: Firestore snapshot $(date +%Y-%m-%d %H:%M UTC)"
          git push
