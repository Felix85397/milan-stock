        const firebaseConfig = {

        const app = initializeApp(firebaseConfig);

        // ============================================

            { name: "Pietro Terracciano", role: "P", value: "1.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            { name: "Lorenzo Torriani", role: "P", value: "500 K €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            // DIFENSORI
            { name: "Strahinja Pavlović", role: "D", value: "35.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            { name: "Koni De Winter", role: "D", value: "23.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            { name: "Fikayo Tomori", role: "D", value: "20.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            { name: "Matteo Gabbia", role: "D", value: "20.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            { name: "David Odogu", role: "D", value: "5.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            { name: "Davide Bartesaghi", role: "D", value: "23.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            { name: "Pervis Estupiñán", role: "D", value: "14.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            { name: "Zachary Athekame", role: "D", value: "10.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            // CENTROCAMPISTI
            { name: "Ardon Jashari", role: "C", value: "30.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            { name: "Youssouf Fofana", role: "C", value: "25.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            { name: "Samuele Ricci", role: "C", value: "25.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            { name: "Adrien Rabiot", role: "C", value: "20.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            { name: "Ruben Loftus-Cheek", role: "C", value: "10.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            { name: "Luka Modrić", role: "C", value: "4.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            { name: "Alexis Saelemaekers", role: "C", value: "25.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            // ATTACCANTI
            { name: "Rafael Leão", role: "A", value: "65.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            { name: "Christian Pulisic", role: "A", value: "50.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            { name: "Christopher Nkunku", role: "A", value: "28.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            { name: "Santiago Gimenez", role: "A", value: "20.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 },
            { name: "Niclas Füllkrug", role: "A", value: "5.00 MLN €", votesBuy: 0, votesHold: 0, votesSell: 0 }
        ];

        // Backup voti — aggiornato unendo snapshot precedente + voti arrivati dopo l'azzeramento
        const voteRestore = {
            'adrien-rabiot':       { votesBuy: 85, votesHold:  4, votesSell:  5 }, // 94 tot
            'alexis-saelemaekers': { votesBuy: 74, votesHold: 10, votesSell:  5 }, // 89 tot
            'ardon-jashari':       { votesBuy: 57, votesHold: 20, votesSell:  9 }, // 86 tot
            'christian-pulisic':   { votesBuy: 36, votesHold: 46, votesSell: 14 }, // 96 tot
            'christopher-nkunku':  { votesBuy:  5, votesHold:  6, votesSell: 78 }, // 89 tot
            'david-odogu':         { votesBuy: 10, votesHold: 64, votesSell: 13 }, // 87 tot
            'davide-bartesaghi':   { votesBuy: 70, votesHold: 16, votesSell:  5 }, // 91 tot
            'fikayo-tomori':       { votesBuy: 11, votesHold: 72, votesSell: 13 }, // 96 tot
            'koni-de-winter':      { votesBuy: 62, votesHold: 16, votesSell: 12 }, // 90 tot
            'lorenzo-torriani':    { votesBuy: 16, votesHold: 58, votesSell: 13 }, // 87 tot
            'luka-modric':         { votesBuy: 75, votesHold:  5, votesSell: 13 }, // 93 tot
            'matteo-gabbia':       { votesBuy: 65, votesHold: 13, votesSell: 11 }, // 89 tot
            'mike-maignan':        { votesBuy: 74, votesHold: 13, votesSell: 11 }, // 98 tot
            'niclas-fullkrug':     { votesBuy:  4, votesHold:  6, votesSell: 76 }, // 86 tot
            'pervis-estupinan':    { votesBuy:  5, votesHold:  4, votesSell: 83 }, // 92 tot
            'pietro-terracciano':  { votesBuy:  6, votesHold:  9, votesSell: 72 }, // 87 tot
            'rafael-leao':         { votesBuy: 12, votesHold: 32, votesSell: 57 }, // 101 tot
            'ruben-loftus-cheek':  { votesBuy:  5, votesHold:  7, votesSell: 72 }, // 84 tot
            'samuele-ricci':       { votesBuy: 15, votesHold: 65, votesSell: 14 }, // 94 tot
            'santiago-gimenez':    { votesBuy:  5, votesHold:  7, votesSell: 78 }, // 90 tot
            'strahinja-pavlovic':  { votesBuy: 80, votesHold: 11, votesSell:  6 }, // 97 tot
            'youssouf-fofana':     { votesBuy: 21, votesHold: 51, votesSell: 19 }, // 91 tot
            'zachary-athekame':    { votesBuy: 17, votesHold: 51, votesSell: 18 }, // 86 tot
        };

        // ============================================
        // STATE MANAGEMENT
        // ============================================
        let players = [];
        let votedPlayers = new Set();
        let currentFilter = 'ALL';

        // ============================================
        // INIZIALIZZAZIONE
        // ============================================

        // Genera un ID stabile dal nome del giocatore (es. "Rafael Leão" → "rafael-leao")
        function getPlayerId(name) {
            return name.toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-|-$/g, '');
        }

        async function initializeMilanApp() {
            try {
                const savedVotes = localStorage.getItem('milanStockVotes');
                if (savedVotes) {
                    votedPlayers = new Set(JSON.parse(savedVotes));
                }

                const playersCollection = collection(db, 'players');
                const snapshot = await getDocs(playersCollection);

                const canonicalIds = new Set(initialPlayers.map(p => getPlayerId(p.name)));

                // Raggruppa i doc esistenti per nome (per salvare voti da doc non-canonici)
                const byName = {};
                snapshot.docs.forEach(d => {
                    const data = d.data();
                    if (data.name) {
                        if (!byName[data.name]) byName[data.name] = [];
                        byName[data.name].push({ id: d.id, ...data });
                    }
                });

                const existingCanonicalIds = new Set(
                    snapshot.docs.filter(d => canonicalIds.has(d.id)).map(d => d.id)
                );

                const batch = writeBatch(db);
                let hasChanges = false;

                // Elimina doc con ID non-canonici (residui del vecchio codice)
                snapshot.docs.forEach(d => {
                    if (!canonicalIds.has(d.id)) {
                        batch.delete(doc(playersCollection, d.id));
                        hasChanges = true;
                    }
                });

                // Crea solo i doc canonici MANCANTI — quelli esistenti non vengono mai toccati.
                // Se non ci sono doc non-canonici da migrare, usa voteRestore come floor minimo.
                for (const player of initialPlayers) {
                    const canonicalId = getPlayerId(player.name);
                    if (!existingCanonicalIds.has(canonicalId)) {
                        const nonCanonical = (byName[player.name] || []).filter(d => d.id !== canonicalId);
                        const backup = voteRestore[canonicalId] || {};
                        const totalBuy  = nonCanonical.length > 0
                            ? nonCanonical.reduce((s, d) => s + (d.votesBuy  || 0), 0)
                            : (backup.votesBuy  || 0);
                        const totalHold = nonCanonical.length > 0
                            ? nonCanonical.reduce((s, d) => s + (d.votesHold || 0), 0)
                            : (backup.votesHold || 0);
                        const totalSell = nonCanonical.length > 0
                            ? nonCanonical.reduce((s, d) => s + (d.votesSell || 0), 0)
                            : (backup.votesSell || 0);
                        batch.set(doc(playersCollection, canonicalId), {
                            ...player,
                            votesBuy: totalBuy,
                            votesHold: totalHold,
                            votesSell: totalSell
                        });
                        hasChanges = true;
                    }
                }

                if (hasChanges) await batch.commit();

                // Ripristino manuale voti: visita /?restore=milan2025v2 una volta sola.
                // Usa Math.max(backup, current) così non si perdono mai voti più recenti del backup.
                if (new URLSearchParams(window.location.search).get('restore') === 'milan2025v2') {
                    const freshSnap = await getDocs(playersCollection);
                    const currentData = {};
                    freshSnap.docs.forEach(d => { currentData[d.id] = d.data(); });
                    const rb = writeBatch(db);
                    initialPlayers.forEach(player => {
                        const id = getPlayerId(player.name);
                        const backup  = voteRestore[id] || {};
                        const current = currentData[id]  || {};
                        rb.set(doc(playersCollection, id), {
                            ...player,
                            votesBuy:  Math.max(backup.votesBuy  || 0, current.votesBuy  || 0),
                            votesHold: Math.max(backup.votesHold || 0, current.votesHold || 0),
                            votesSell: Math.max(backup.votesSell || 0, current.votesSell || 0),
                        });
                    });
                    await rb.commit();
                    window.history.replaceState({}, '', '/');
                    showNotification('✅ Voti ripristinati!', 'success');
                }

                onSnapshot(playersCollection, (snap) => {
                    players = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderPlayers();
                    updateStats();
                });

                hideLoading();
            } catch (error) {
                console.error('Errore inizializzazione:', error);
                showNotification('Errore di connessione a Firebase. Verifica la configurazione.', 'error');
                hideLoading();
            }
        }

        // ============================================
        // GESTIONE VOTO
        // ============================================
        window.handleVote = async function(playerId, voteType) {
            if (votedPlayers.has(playerId)) {
                showNotification('Hai già votato per questo giocatore', 'warning');
                return;
            }

            try {
                const playerRef = doc(db, 'players', playerId);
                const voteField = voteType === 'buy' ? 'votesBuy' : 
                                voteType === 'hold' ? 'votesHold' : 'votesSell';
                
                await updateDoc(playerRef, {
                    [voteField]: increment(1)
                });

                votedPlayers.add(playerId);
                localStorage.setItem('milanStockVotes', JSON.stringify([...votedPlayers]));

                showNotification('Voto registrato con successo!', 'success');
            } catch (error) {
                console.error('Errore voto:', error);
                showNotification('Errore durante il voto. Riprova.', 'error');
            }
        };

        // ============================================
        // FILTRI
        // ============================================
        window.setFilter = function(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-red-600', 'text-white');
                btn.classList.add('bg-slate-700', 'text-slate-300');
            });
            event.target.classList.remove('bg-slate-700', 'text-slate-300');
            event.target.classList.add('bg-red-600', 'text-white');
            renderPlayers();
        };

        // ============================================
        // RENDER
        // ============================================
        function renderPlayers() {
            const filteredPlayers = currentFilter === 'ALL' 
                ? players 
                : players.filter(p => p.role === currentFilter);

            const container = document.getElementById('playersGrid');
            container.innerHTML = filteredPlayers.map(player => {
                const percentages = getPercentages(player);
                const sentiment = getPlayerSentiment(player);
                const hasVoted = votedPlayers.has(player.id);
                const totalVotes = player.votesBuy + player.votesHold + player.votesSell;
                const roleLabel = player.role === 'P' ? 'Portiere' : 
                                player.role === 'D' ? 'Difensore' : 
                                player.role === 'C' ? 'Centrocampista' : 'Attaccante';

                return `
                    <div class="bg-slate-800 rounded-lg border border-slate-700 overflow-hidden hover:border-red-600 transition-all duration-300">
                        <div class="bg-gradient-to-r from-slate-700 to-slate-800 p-4 border-b border-slate-700">
                            <div class="flex items-start justify-between mb-2">
                                <div>
                                    <h3 class="text-lg font-bold text-white">${player.name}</h3>
                                    <p class="text-sm text-slate-400">${roleLabel}</p>
                                </div>
                                <div class="${sentiment.color} font-bold text-sm flex items-center gap-1">
                                    ${sentiment.icon}
                                    ${sentiment.label}
                                </div>
                            </div>
                            <div class="flex items-center justify-between">
                                <div class="text-red-600 font-bold text-xl">${player.value}</div>
                                <div class="text-slate-400 text-sm">${totalVotes} voti</div>
                            </div>
                        </div>

                        <div class="p-4 space-y-3">
                            <!-- BUY -->
                            <div>
                                <div class="flex justify-between text-sm mb-1">
                                    <span class="text-green-400 font-medium">🟢 BUY</span>
                                    <span class="text-green-400 font-bold">${percentages.buy}%</span>
                                </div>
                                <div class="w-full bg-slate-700 rounded-full h-2 overflow-hidden">
                                    <div class="bg-green-500 h-2 rounded-full transition-all duration-500" style="width: ${percentages.buy}%"></div>
                                </div>
                            </div>

                            <!-- HOLD -->
                            <div>
                                <div class="flex justify-between text-sm mb-1">
                                    <span class="text-yellow-400 font-medium">🟡 HOLD</span>
                                    <span class="text-yellow-400 font-bold">${percentages.hold}%</span>
                                </div>
                                <div class="w-full bg-slate-700 rounded-full h-2 overflow-hidden">
                                    <div class="bg-yellow-500 h-2 rounded-full transition-all duration-500" style="width: ${percentages.hold}%"></div>
                                </div>
                            </div>

                            <!-- SELL -->
                            <div>
                                <div class="flex justify-between text-sm mb-1">
                                    <span class="text-red-400 font-medium">🔴 SELL</span>
                                    <span class="text-red-400 font-bold">${percentages.sell}%</span>
                                </div>
                                <div class="w-full bg-slate-700 rounded-full h-2 overflow-hidden">
                                    <div class="bg-red-500 h-2 rounded-full transition-all duration-500" style="width: ${percentages.sell}%"></div>
                                </div>
                            </div>
                        </div>

                        <div class="p-4 pt-0">
                            ${hasVoted ? `
                                <div class="bg-slate-700 text-center py-3 rounded-lg text-green-400 font-medium">
                                    ✓ Voto Registrato
                                </div>
                            ` : `
                                <div class="grid grid-cols-3 gap-2">
                                    <button onclick="handleVote('${player.id}', 'buy')" 
                                            class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-3 rounded-lg transition-all text-sm">
                                        BUY
                                    </button>
                                    <button onclick="handleVote('${player.id}', 'hold')" 
                                            class="bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-2 px-3 rounded-lg transition-all text-sm">
                                        HOLD
                                    </button>
                                    <button onclick="handleVote('${player.id}', 'sell')" 
                                            class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-3 rounded-lg transition-all text-sm">
                                        SELL
                                    </button>
                                </div>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            const totalVotes = players.reduce((sum, p) => sum + p.votesBuy + p.votesHold + p.votesSell, 0);
            const totalBuyVotes = players.reduce((sum, p) => sum + p.votesBuy, 0);
            const totalSellVotes = players.reduce((sum, p) => sum + p.votesSell, 0);
            const marketSentiment = totalBuyVotes > totalSellVotes ? 'RIALZISTA' : 
                                  totalSellVotes > totalBuyVotes ? 'RIBASSISTA' : 'NEUTRALE';
            const sentimentClass = marketSentiment === 'RIALZISTA' ? 'text-green-400' :
                                 marketSentiment === 'RIBASSISTA' ? 'text-red-400' : 'text-yellow-400';

            document.getElementById('totalVotes').textContent = totalVotes.toLocaleString();
            document.getElementById('totalBuyVotes').textContent = totalBuyVotes.toLocaleString();
            document.getElementById('totalSellVotes').textContent = totalSellVotes.toLocaleString();
            document.getElementById('marketSentiment').textContent = marketSentiment;
            document.getElementById('marketSentiment').className = `text-2xl font-bold ${sentimentClass}`;
        }

        // ============================================
        // UTILITIES
        // ============================================
        function getPercentages(player) {
            const total = player.votesBuy + player.votesHold + player.votesSell;
            if (total === 0) return { buy: 0, hold: 0, sell: 0 };
            
            return {
                buy: Math.round((player.votesBuy / total) * 100),
                hold: Math.round((player.votesHold / total) * 100),
                sell: Math.round((player.votesSell / total) * 100)
            };
        }

        function getPlayerSentiment(player) {
            const percentages = getPercentages(player);
            const max = Math.max(percentages.buy, percentages.hold, percentages.sell);
            
            if (max === percentages.buy) {
                return { 
                    label: 'STRONG BUY', 
                    color: 'text-green-400',
                    icon: '📈'
                };
            }
            if (max === percentages.sell) {
                return { 
                    label: 'STRONG SELL', 
                    color: 'text-red-400',
                    icon: '📉'
                };
            }
            return { 
                label: 'HOLD', 
                color: 'text-yellow-400',
                icon: '➖'
            };
        }

        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `fixed top-4 right-4 z-50 px-6 py-3 rounded-lg shadow-lg animate-pulse ${
                type === 'success' ? 'bg-green-600' :
                type === 'warning' ? 'bg-yellow-600' : 'bg-red-600'
            } text-white`;
            notification.style.display = 'block';
            setTimeout(() => notification.style.display = 'none', 3000);
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        }

        // ============================================
        // START APP
        // ============================================
        window.addEventListener('DOMContentLoaded', initializeMilanApp);
    </script>
</head>
